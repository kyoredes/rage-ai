syntax = "proto3";

package auth.v1;

option go_package = "agrobot/proto/gen/go/auth/v1;authv1";

service AuthService {
  rpc StartTelegram(StartTelegramRequest) returns (StartTelegramResponse);
  rpc GetTelegramProfile(GetTelegramProfileRequest) returns (GetTelegramProfileResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc GetStats(GetAuthStatsRequest) returns (GetAuthStatsResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message StartTelegramRequest {
  string telegram_id = 1;
}

message StartTelegramResponse {
  string user_id = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message GetTelegramProfileRequest {
  string telegram_id = 1;
}

message GetTelegramProfileResponse {
  string user_id = 1;
  string telegram_id = 2;
  string email = 3;
}

message ListUsersRequest {
  int32 page = 1;
  int32 limit = 2;
  string search = 3;
}

message UserItem {
  string user_id = 1;
  string email = 2;
  string telegram_id = 3;
  int64 created_at = 4;
}

message ListUsersResponse {
  repeated UserItem users = 1;
  int32 total = 2;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  string user_id = 1;
  string email = 2;
  string telegram_id = 3;
  int64 created_at = 4;
  int64 updated_at = 5;
}

message UpdateUserRequest {
  string user_id = 1;
  string email = 2;
}

message UpdateUserResponse {
  string user_id = 1;
  string email = 2;
}

message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {}

message GetAuthStatsRequest {}

message GetAuthStatsResponse {
  int32 total_users = 1;
  int32 new_users_7d = 2;
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  bool db_ok = 2;
  bool redis_ok = 3;
}
